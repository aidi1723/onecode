name: verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  onecode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify OneCode
        run: bash scripts/verify.sh
